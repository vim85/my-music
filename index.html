<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2 class="logo"><i class="fas fa-compact-disc"></i> MyMusic</h2>
            <nav class="sidebar-nav">
                <div class="nav-item active" id="navHome" onclick="fetchTrendingSongs()"><i class="fas fa-home"></i> Home</div>
                <div class="nav-item" id="navFav" onclick="showFavorites()"><i class="fas fa-heart"></i> Favorites</div>
            </nav>
            <div class="upload-section">
                <label for="localFile" class="btn-secondary">
                    <i class="fas fa-folder-open"></i> Local Music
                    <input type="file" id="localFile" accept="audio/*" multiple hidden>
                </label>
            </div>
        </aside>

        <main class="content" id="mainContent">
            <header class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search songs or artists..." onkeypress="handleSearch(event)">
                </div>
            </header>
            
            <div id="exploreSection">
                <div class="scroll-container">
                    <h3>🎭 Moods & Genres</h3>
                    <div class="chips-scroll" id="chipsContainer"></div>
                    <div class="category-section" style="margin-top: 15px;">
                        <h4 id="moodCategoryTitle" style="color: #b3b3b3; margin-bottom: 10px; font-weight: normal;">Top Hindi Picks</h4>
                        <div id="moodCategoryList" class="song-grid-horizontal"></div>
                    </div>
                </div>

                <div class="scroll-container">
                    <h3>🎤 Top Artists</h3>
                    <div class="artist-scroll" id="artistsContainer"></div>
                </div>
            </div>

            <div id="homeCategories">
                <div class="category-section"><h2>🔥 Trending Now</h2><div id="trendingList" class="song-grid-horizontal"></div></div>
                <div class="category-section"><h2>💃 Punjabi Hits</h2><div id="punjabiList" class="song-grid-horizontal"></div></div>
                <div class="category-section"><h2>❤️ Romantic Picks</h2><div id="romanticList" class="song-grid-horizontal"></div></div>
                <div class="category-section"><h2>😢 Sad Songs</h2><div id="sadList" class="song-grid-horizontal"></div></div>
                
                <div class="category-section" style="margin-top: 40px; border-top: 1px solid #282828; padding-top: 20px;">
                    <h2>🔮 Suggestions for You</h2>
                    <div id="suggestionsGrid" class="song-grid"></div>
                    <div id="loadingSuggestions" style="text-align: center; padding: 20px; display: none; color: #b3b3b3;">
                        <i class="fas fa-spinner fa-spin" style="font-size: 1.5rem;"></i> Loading more mixes...
                    </div>
                </div>
            </div>

            <div id="searchResultsSection" style="display: none;">
                <h2 id="listTitle">Search Results</h2>
                <div id="songList" class="song-grid"></div>
                <div id="loadingMore" style="text-align: center; padding: 20px; display: none; color: #b3b3b3;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 1.5rem;"></i> Loading more songs...
                </div>
            </div>
        </main>

        <footer class="player">
            <audio id="audioPlayer" style="display: none;"></audio>
            <div class="progress-area" id="progressContainer" onclick="seekSong(event)">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            
            <div class="player-inner">
                <div class="current-track" onclick="openMobilePlayer()">
                    <img id="currTrackImg" src="https://placehold.co/60" alt="">
                    <div class="track-details">
                        <div id="currTrackName">No Song</div>
                        <small id="currArtistName">Search to play</small>
                    </div>
                </div>
                
                <div class="controls">
                    <button id="favBtn" onclick="toggleFavorite()"><i class="far fa-heart" id="favIcon"></i></button>
                    <button id="prevBtn" onclick="playPrev()"><i class="fas fa-step-backward"></i></button>
                    <button id="playBtn" class="play-main" onclick="togglePlayPause()"><i class="fas fa-play" id="playIcon"></i></button>
                    <button id="nextBtn" onclick="playNext()"><i class="fas fa-step-forward"></i></button>
                </div>
                
                <div class="extra-controls" style="display:flex; align-items:center; gap:15px; color:#b3b3b3;">
                    <button onclick="downloadSong()"><i class="fas fa-download"></i></button>
                    <button onclick="setSleepTimer()"><i class="fas fa-moon"></i></button>
                    <i class="fas fa-volume-up"></i>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" onchange="changeVolume()">
                </div>
            </div>
        </footer>
    </div>
    
    <div id="mobilePlayerPopup" class="mobile-player-popup">
        <div class="mp-header">
            <button onclick="closeMobilePlayer()"><i class="fas fa-chevron-down"></i></button>
            <span>Now Playing</span>
            <button onclick="toggleFavorite()"><i class="far fa-heart" id="mpFavIcon"></i></button>
        </div>
        <div class="mp-art">
            <img id="mpTrackImg" src="https://placehold.co/300" alt="Album Art">
        </div>
        <div class="mp-details">
            <h3 id="mpTrackName">No Song</h3>
            <p id="mpArtistName">Search to play</p>
        </div>
        
        <div class="mp-progress">
            <div class="mp-time">
                <span id="mpCurrentTime">0:00</span>
                <span id="mpDuration">0:00</span>
            </div>
            <div class="progress-area" id="mpProgressContainer" onclick="seekSong(event)">
                <div class="progress-bar" id="mpProgressBar"></div>
            </div>
        </div>
        
        <div class="mp-controls">
            <button onclick="playPrev()"><i class="fas fa-step-backward"></i></button>
            <button class="mp-play-main" onclick="togglePlayPause()"><i class="fas fa-play" id="mpPlayIcon"></i></button>
            <button onclick="playNext()"><i class="fas fa-step-forward"></i></button>
        </div>

        <div class="mp-extra-controls">
            <button onclick="downloadSong()" style="color: white;"><i class="fas fa-download"></i></button>
            <div class="mp-volume">
                <i class="fas fa-volume-up"></i>
                <input type="range" id="mpVolumeSlider" min="0" max="1" step="0.1" value="1" onchange="changeMpVolume()">
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
