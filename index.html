<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <h2 class="logo"><i class="fas fa-compact-disc"></i> MyMusic</h2>
            <nav>
                <div class="nav-item active" onclick="searchSongs('Top Hits')"><i class="fas fa-home"></i> Home</div>
            </nav>
            <div class="upload-section">
                <label for="localFile" class="btn-upload">
                    <i class="fas fa-plus"></i> Local Files
                    <input type="file" id="localFile" accept="audio/*" multiple hidden>
                </label>
            </div>
        </aside>

        <main class="content">
            <header class="top-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search songs or artists...">
                </div>
            </header>
            <h2 id="listTitle">Trending Now</h2>
            <div id="songList" class="song-grid">
                <p class="status-msg">Loading Player...</p>
            </div>
        </main>

        <footer class="player">
            <div class="progress-area" id="progressContainer"><div class="progress-bar" id="progressBar"></div></div>
            <div class="player-inner">
                <div class="current-track">
                    <img id="currTrackImg" src="https://placehold.co/60" alt="">
                    <div class="track-details">
                        <div id="currTrackName">No Song</div>
                        <small id="currArtistName">Search to play</small>
                    </div>
                </div>
                <div class="controls">
                    <button id="prevBtn"><i class="fas fa-step-backward"></i></button>
                    <button id="playBtn" class="play-main"><i class="fas fa-play"></i></button>
                    <button id="nextBtn"><i class="fas fa-step-forward"></i></button>
                </div>
                <div class="extra-controls">
                    <i class="fas fa-volume-up"></i>
                    <input type="range" id="volumeSlider" min="0" max="100" value="80">
                </div>
            </div>
        </footer>
    </div>

    <div id="yt-player-container" style="display:none;"><div id="youtubePlayer"></div></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script.js"></script>
</body>
</html>
